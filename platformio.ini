; PlatformIO project — GPS Accident Detection System (ESP8266)
; Migrated to Clean Architecture. See src/ for the layered structure.

[platformio]
default_envs = nodemcuv2

; ── Firmware target (ESP8266 NodeMCU) ────────────────────────────
[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
build_flags =
    -I src
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.5
    electroniccats/MPU6050 @ ^1.3.1
; NOTE: SoftwareSerial, ESP8266WiFi, WiFiClientSecure, ArduinoOTA, LittleFS and
; EEPROM ship with the ESP8266 Arduino core — do NOT add them as lib_deps.

; ── Host unit tests (Domain/Application logic, no hardware) ───────
[env:native]
platform = native
test_framework = unity
build_flags =
    -I src
    -std=c++17
; Compile ONLY the hardware-free algorithm into the native test binary.
build_src_filter =
    -<*>
    +<application/AccidentAlgorithm.cpp>
